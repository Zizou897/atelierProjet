<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CTAMS - Reinitialisation mot de passe">
    <title>CTAMS - Mot de passe oublie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-1: #0f2027;
            --bg-2: #203a43;
            --bg-3: #2c5364;
            --surface: #ffffff;
            --text-1: #18212e;
            --text-2: #5a6678;
            --accent: #0b7fab;
            --accent-2: #1fa2ff;
            --line: #e8edf3;
            --danger-bg: #fee;
            --danger-line: #fcc;
            --danger-text: #a12828;
            --ok-bg: #e8f7ee;
            --ok-line: #bde7cc;
            --ok-text: #1f6d3f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: var(--text-1);
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
        }

        .shell {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 18px 34px;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 14px;
            color: #fff;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            backdrop-filter: blur(4px);
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 14px; opacity: 0.9; }

        .btn-top {
            text-decoration: none;
            border-radius: 8px;
            padding: 9px 14px;
            font-weight: 700;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        .layout {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
            padding: 20px;
        }

        .intro {
            margin-bottom: 14px;
            color: var(--text-2);
            font-size: 14px;
            line-height: 1.5;
        }

        .alert {
            border-radius: 8px;
            padding: 11px 12px;
            margin-bottom: 12px;
            font-size: 13px;
            line-height: 1.45;
        }

        .alert-error {
            background: var(--danger-bg);
            border: 1px solid var(--danger-line);
            color: var(--danger-text);
        }

        .alert-success {
            background: var(--ok-bg);
            border: 1px solid var(--ok-line);
            color: var(--ok-text);
        }

        .field label {
            display: block;
            margin-bottom: 7px;
            font-size: 12px;
            color: #4f607a;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .field input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 14px;
            color: var(--text-1);
            background: #fff;
            outline: none;
        }

        .field input:focus {
            border-color: #7eb7d6;
            box-shadow: 0 0 0 3px rgba(31, 162, 255, 0.15);
        }

        .actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            color: #fff;
            border: 0;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-secondary {
            text-decoration: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 13px;
            border: 1px solid var(--line);
            color: var(--text-1);
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="topbar">
            <div>
                <h1 class="title">Mot de passe oublie</h1>
                <p class="subtitle">Recevoir les instructions de reinitialisation.</p>
            </div>
            <a class="btn-top" href="{% url 'login' %}"><i class="fa-solid fa-arrow-left"></i> Retour connexion</a>
        </section>

        <main class="layout">
            <p class="intro">
                Saisissez votre email professionnel. Si un compte existe, un email de reinitialisation sera envoye.
            </p>

            {% if error %}
                <div class="alert alert-error">{{ error }}</div>
            {% endif %}
            {% if success %}
                <div class="alert alert-success">{{ success }}</div>
            {% endif %}

            <form method="post" action="{% url 'forgot_password' %}">
                {% csrf_token %}
                <div class="field">
                    <label for="email">Email professionnel</label>
                    <input type="email" id="email" name="email" placeholder="vous@entreprise.fr" required maxlength="180" value="{{ request.POST.email|default:'' }}">
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary"><i class="fa-solid fa-envelope"></i> Envoyer les instructions</button>
                    <a href="{% url 'login' %}" class="btn-secondary">Annuler</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
